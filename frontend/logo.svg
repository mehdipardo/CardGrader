<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="clip-top"><rect x="0" y="0" width="100" height="50"/></clipPath>
    <clipPath id="clip-bot"><rect x="0" y="50" width="100" height="50"/></clipPath>
    <clipPath id="clip-badge"><circle cx="79" cy="79" r="13"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#16171e"/>

  <!-- Pokéball: red top, white bottom -->
  <circle cx="50" cy="47" r="34" fill="#cc2233"/>
  <circle cx="50" cy="47" r="34" fill="#f0f0f0" clip-path="url(#clip-bot)"/>

  <!-- Pokéball dividing stripe -->
  <rect x="16" y="43" width="68" height="8" fill="#111"/>

  <!-- Center button -->
  <circle cx="50" cy="47" r="8" fill="#111"/>
  <circle cx="50" cy="47" r="4.5" fill="#f0f0f0" stroke="#111" stroke-width="1"/>

  <!-- G letter — red top half -->
  <text x="52" y="76" text-anchor="middle"
        font-family="'Arial Black', 'Impact', Arial" font-size="76" font-weight="900"
        fill="#cc2233" clip-path="url(#clip-top)">G</text>

  <!-- G letter — white bottom half -->
  <text x="52" y="76" text-anchor="middle"
        font-family="'Arial Black', 'Impact', Arial" font-size="76" font-weight="900"
        fill="#f0f0f0" clip-path="url(#clip-bot)">G</text>

  <!-- G letter — black outline -->
  <text x="52" y="76" text-anchor="middle"
        font-family="'Arial Black', 'Impact', Arial" font-size="76" font-weight="900"
        fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round">G</text>

  <!-- Gold grade badge -->
  <circle cx="79" cy="79" r="13" fill="#d4af37"/>
  <text x="79" y="84" text-anchor="middle"
        font-family="Arial" font-size="12" font-weight="900" fill="#16171e">10</text>

  <!-- Gold border (drawn last to stay on top) -->
  <rect x="2.5" y="2.5" width="95" height="95" rx="16" fill="none" stroke="#d4af37" stroke-width="3.5"/>
</svg>
