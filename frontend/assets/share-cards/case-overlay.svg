<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 645" width="460" height="645">
  <defs>
    <linearGradient id="sheen1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="35%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="edgeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edgeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Main border frame (the acrylic case edge) -->
  <rect x="2" y="2" width="456" height="641" rx="22"
        fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2.5"/>

  <!-- Inner subtle border -->
  <rect x="8" y="8" width="444" height="629" rx="18"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Top-left corner sheen — diagonal reflection -->
  <path d="M22,2 L2,22 L2,220 Q2,2 220,2 Z" fill="url(#sheen1)" opacity="0.7"/>

  <!-- Right edge reflection strip -->
  <rect x="440" y="20" width="18" height="605" rx="9" fill="url(#edgeRight)" opacity="0.6"/>

  <!-- Bottom edge reflection -->
  <rect x="20" y="626" width="420" height="15" rx="7" fill="url(#edgeBottom)" opacity="0.5"/>

  <!-- Top highlight bar -->
  <path d="M40,5 Q230,1 420,5" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round"/>

  <!-- Corner arc highlights -->
  <path d="M24,4 Q4,4 4,24 L4,70" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <path d="M436,4 Q456,4 456,24 L456,70" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
</svg>
