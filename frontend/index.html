/* ── ShareModal ───────────────────────────────────────────────────────── */
function ShareModal({ theme, report, onClose }) {
  const [status, setStatus]   = React.useState('idle'); // idle | generating | done | error
  const [dataUrl, setDataUrl] = React.useState(null);
  const captureId = 'share-card-capture-target';

  const generate = React.useCallback(async () => {
    setStatus('generating');
    await new Promise(r => setTimeout(r, 120)); // let DOM settle
    const node = document.getElementById(captureId);
    if (!node) { setStatus('error'); return; }
    try {
      const url = await window.htmlToImage.toPng(node, {
        width: 1080, height: 1920,
        pixelRatio: 1,
        backgroundColor: '#000000',
        quality: 1.0,
        fetchRequestInit: { cache: 'force-cache' },
      });
      setDataUrl(url);
      setStatus('done');
    } catch (e) {
      console.error('html-to-image error:', e);
      setStatus('error');
    }
  }, []);

  React.useEffect(() => { generate(); }, [generate]);

  const download = () => {
    if (!dataUrl) return;
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `pokegrader-${(report?.identity?.name || 'carte').toLowerCase().replace(/\s+/g, '-')}.png`;
    a.click();
  };

  const share = async () => {
    if (!dataUrl) return;
    try {
      if (navigator.share && navigator.canShare) {
        const blob = await fetch(dataUrl).then(r => r.blob());
        const file = new File([blob], 'pokegrader-card.png', { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'PokéGrader', text: `${report?.identity?.name} — PokéGrader` });
          return;
        }
      }
      download(); // Fallback
    } catch (e) {
      if (e.name !== 'AbortError') download();
    }
  };

  const PREVIEW_W = Math.min(320, (typeof window !== 'undefined' ? window.innerWidth : 390) - 48);
  const scale     = PREVIEW_W / 1080;
  const PREVIEW_H = Math.round(1920 * scale);

  return (
    <div
      style={{ position:'fixed', inset:0, zIndex:300, background:'rgba(0,0,0,0.88)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:16, animation:'pgFade .2s ease' }}
      onClick={onClose}
    >
      <div onClick={e => e.stopPropagation()} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16, maxHeight:'95vh', width: PREVIEW_W + 32 }}>

        {/* Preview area */}
        <div style={{ width:PREVIEW_W, height:PREVIEW_H, borderRadius:12, overflow:'hidden', position:'relative', boxShadow:'0 12px 60px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4)', flexShrink:0 }}>
          <div style={{ transformOrigin:'top left', transform:`scale(${scale})`, width:1080, height:1920, pointerEvents:'none' }}>
            <ShareCardHolyPull report={report} elId="share-card-preview"/>
          </div>
          {status === 'generating' && (
            <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:10 }}>
              <Spinner size={32} color="#fff"/>
              <span style={{ color:'rgba(255,255,255,0.8)', fontSize:12, fontFamily:"'Geist', system-ui" }}>Génération en cours…</span>
            </div>
          )}
        </div>

        {/* Hidden full-size capture target */}
        <div style={{ position:'fixed', top:0, left:'-1200px', width:1080, height:1920, pointerEvents:'none', overflow:'hidden' }}>
          <ShareCardHolyPull report={report} elId={captureId}/>
        </div>

        {/* Status / error */}
        {status === 'error' && (
          <div style={{ color:'#f87171', fontSize:12, textAlign:'center', padding:'0 16px' }}>
            La génération a échoué. Vérifie ta connexion et réessaie.
            <button onClick={generate} style={{ marginLeft:8, color:'#fff', background:'none', border:'none', cursor:'pointer', textDecoration:'underline', fontSize:12, fontFamily:"'Geist', system-ui" }}>Réessayer</button>
          </div>
        )}

        {/* Action buttons */}
        <div style={{ display:'flex', gap:10, width:'100%' }}>
          <button
            onClick={download}
            disabled={status !== 'done'}
            style={{ flex:1, height:48, borderRadius:14, border:`1px solid rgba(255,255,255,0.2)`, background:'rgba(255,255,255,0.1)', color:'#fff', fontFamily:"'Geist', system-ui", fontSize:14, fontWeight:600, cursor: status !== 'done' ? 'default' : 'pointer', opacity: status !== 'done' ? 0.5 : 1, transition:'opacity .2s' }}
          >
            Télécharger
          </button>
          <button
            onClick={share}
            disabled={status !== 'done'}
            style={{ flex:1, height:48, borderRadius:14, border:'none', background: status === 'done' ? '#d4af37' : 'rgba(212,175,55,0.4)', color:'#000', fontFamily:"'Geist', system-ui", fontSize:14, fontWeight:700, cursor: status !== 'done' ? 'default' : 'pointer', opacity: status !== 'done' ? 0.6 : 1, transition:'opacity .2s' }}
          >
            Partager
          </button>
        </div>

        <button onClick={onClose} style={{ color:'rgba(255,255,255,0.4)', fontSize:13, border:'none', background:'none', cursor:'pointer', fontFamily:"'Geist', system-ui", padding:'4px 16px' }}>
          Plus tard
        </button>
      </div>
    </div>
  );
}

/* ── Toast notification ────────────────────────────────────────────────── */
function Toast({ message, onDone }) {
  React.useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position:'fixed', bottom:100, left:'50%', transform:'translateX(-50%)', zIndex:200,
      background:GRADE.good, color:'#fff', borderRadius:12, padding:'10px 18px',
      fontFamily:"'Geist', system-ui", fontSize:13, fontWeight:600,
      boxShadow:'0 4px 20px rgba(0,0,0,0.3)', animation:'pgRise .25s ease',
      whiteSpace:'nowrap', maxWidth:'90vw', textAlign:'center' }}>
      {message}
    </div>
  );
}

/* ── CollectionHub ────────────────────────────────────────────────────── */
function CollectionHub({ theme, accent, collection, goTo, openSell, onRemove, tutorialActive, screen, screenArgs, back, openShare }) {
  const subTab = (screen === 'sets' || screen === 'set-detail') ? 'sets'
    : screen === 'dex' ? 'dex'
    : 'cartes';
  const showControl = screen !== 'set-detail' && screen !== 'collection-item';

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', overflow:'hidden' }}>
      {showControl && (
        <div style={{ padding:'10px 16px 0', flexShrink:0 }}>
          <div data-tutorial="collection-tabs" style={{ display:'flex', gap:4, padding:4, background:theme.surface, borderRadius:14, border:`1px solid ${theme.borderS}`, boxShadow:theme.elev1 }}>
            {[
              { k:'cartes', l:'Cartes',  icon:'stack' },
              { k:'sets',   l:'Sets',    icon:'layers' },
              { k:'dex',    l:'Pokédex', icon:'dex' },
            ].map(({ k, l, icon }) => {
              const on = subTab === k;
              return (
                <button key={k} onClick={() => {
                  if (k === 'cartes') goTo('collection');
                  else if (k === 'sets') goTo('sets');
                  else goTo('dex');
                }} style={{
                  flex:1, height:34, borderRadius:10, border:'none', cursor:'pointer',
                  background: on ? theme.bg : 'transparent',
                  color: on ? theme.text : theme.faint,
                  fontFamily:"'Geist', system-ui", fontSize:12.5, fontWeight: on ? 600 : 500,
                  display:'flex', alignItems:'center', justifyContent:'center', gap:5,
                  boxShadow: on ? theme.elev1 : 'none',
                  transition:'background .12s, color .12s',
                }}>
                  {React.createElement(Icon[icon], { size:13, color: on ? theme.text : theme.faint })}
                  {l}
                </button>
              );
            })}
          </div>
        </div>
      )}
      <div style={{ flex:1, overflow:'hidden', minHeight:0 }}>
        {screen === 'collection' && (
          <Collection theme={theme} accent={accent} collection={collection} goTo={goTo} openSell={openSell} onRemove={onRemove} tutorialActive={tutorialActive}/>
        )}
        {screen === 'sets' && (
          <SetsPage theme={theme} accent={accent} collection={collection} goTo={goTo}/>
        )}
        {screen === 'set-detail' && (
          <SetDetailPage theme={theme} accent={accent} collection={collection} setName={screenArgs.setName} setCode={screenArgs.setCode} goTo={goTo} back={back}/>
        )}
        {screen === 'dex' && (
          <PokedexPage theme={theme} accent={accent} collection={collection} goTo={goTo}/>
        )}
        {screen === 'collection-item' && (
          <ScanReport theme={theme} accent={accent} report={screenArgs.collectionItem?.report} back={back} goTo={goTo} onAdd={() => {}} openSell={openSell} openShare={openShare}/>
        )}
      </div>
    </div>
  );
}

/* ── BottomTabs ───────────────────────────────────────────────────────── */
function BottomTabs({ tab, setTab, theme, accent }) {
  const items = [
    { k:'home',       l:'Accueil',    icon:'home' },
    { k:'scan',       l:'Scanner',    icon:'scan', center:true },
    { k:'collection', l:'Collection', icon:'stack' },
  ];
  return (
    <div style={{ position:'sticky', bottom:0, zIndex:40, padding:'6px 8px env(safe-area-inset-bottom, 16px)', background:`linear-gradient(to top, ${theme.bg} 60%, ${theme.bg}00)` }}>
      <div style={{ height:60, borderRadius:22, padding:'0 4px', background:theme.surface, border:`1px solid ${theme.borderS}`, boxShadow:theme.elev2, display:'flex', alignItems:'center', justifyContent:'space-around' }}>
        {items.map(it => {
          const on = tab === it.k || (it.k === 'scan' && tab.startsWith && tab.startsWith('scan'));
          if (it.center) {
            return (
              <button key={it.k} onClick={() => setTab('scan')} style={{ width:50, height:50, borderRadius:99, border:'none', cursor:'pointer', background:accent, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 6px 20px ${accent}55, 0 1px 2px rgba(0,0,0,0.18)`, marginTop:-20, flexShrink:0 }}>
                {React.createElement(Icon[it.icon], { size:20, color:'#fff' })}
              </button>
            );
          }
          return (
            <button key={it.k} onClick={() => setTab(it.k)} style={{ flex:1, height:56, border:'none', background:'transparent', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2, color:on ? theme.text : theme.faint }}>
              {React.createElement(Icon[it.icon], { size:18, color: on ? theme.text : theme.faint })}
              <span style={{ fontFamily:"'Geist', system-ui", fontSize:9.5, fontWeight:on ? 600 : 500 }}>{it.l}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ── App ──────────────────────────────────────────────────────────────── */
function App() {
  const [dark, setDark]           = React.useState(() => localStorage.getItem('pg_dark') !== 'false');
  const [accentKey, setAccentKey] = React.useState(() => localStorage.getItem('pg_accent') || 'Gold');
  const theme  = THEMES[dark ? 'dark' : 'light'];
  const accent = ACCENTS[accentKey] || ACCENTS.Gold;
  const handleDark   = v => { setDark(v); localStorage.setItem('pg_dark', v); };
  const handleAccent = k => { setAccentKey(k); localStorage.setItem('pg_accent', k); };

  const [screen, setScreen]     = React.useState('home');
  const [screenArgs, setArgs]   = React.useState({});
  const [sellOpen, setSellOpen] = React.useState(false);
  const [sellItem, setSellItem] = React.useState(null);
  const [shareOpen, setShareOpen] = React.useState(false);
  const [shareItem, setShareItem] = React.useState(null);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [authOpen, setAuthOpen] = React.useState(false);

  // ── Tutorial state ────────────────────────────────────────────────────
  const [tutorialActive,  setTutorialActive]  = React.useState(false);
  const [tutorialStep,    setTutorialStep]     = React.useState(1);
  const [tutorialExiting, setTutorialExiting]  = React.useState(false);
  const [sandboxMode,     setSandboxMode]      = React.useState(false);

  React.useEffect(() => {
    const done = localStorage.getItem('tutorial_completed');
    if (!done || done === 'false') {
      setTutorialActive(true);
      setScreen('home');
    }
  }, []);

  const enterSandboxMode = () => {
    setTutorialActive(false);
    setSandboxMode(true);
    setScreen('home');
    setArgs({});
  };

  const exitSandbox = (thenOpenAuth = false) => {
    localStorage.setItem('tutorial_completed', 'true');
    setSandboxMode(false);
    setTutorialExiting(true);
    setTimeout(() => {
      setTutorialExiting(false);
      if (thenOpenAuth) setAuthOpen(true);
    }, 2500);
  };

  const exitTutorial = (thenOpenAuth = false) => {
    localStorage.setItem('tutorial_completed', 'true');
    setTutorialActive(false);
    setTutorialExiting(true);
    setTimeout(() => {
      setTutorialExiting(false);
      if (thenOpenAuth) setAuthOpen(true);
    }, 2500);
  };

  const completeTutorial     = () => exitTutorial(false);
  const completeTutorialAuth = () => exitTutorial(true);
  const skipTutorial         = () => enterSandboxMode();
  const exploreSandbox       = () => enterSandboxMode();
  const nextTutorialStep     = () => setTutorialStep(s => Math.min(s + 1, 10));
  const replayTutorial     = () => {
    localStorage.setItem('tutorial_completed', 'false');
    window.location.reload();
  };

  // Tutorial page navigation: step 5→grading, step 6→home, step 7→sets, step 8→dex, step 9→sell
  const prevTutorialStep = React.useRef(1);
  React.useEffect(() => {
    if (!tutorialActive) return;
    const prev = prevTutorialStep.current;
    prevTutorialStep.current = tutorialStep;
    if (tutorialStep === 5) {
      setScreen('collection-item');
      setArgs({ collectionItem: DEMO_COLLECTION[0] }); // Dracaufeu
    } else if (tutorialStep === 6) {
      setScreen('home');
      setArgs({});
    } else if (tutorialStep === 7) {
      setScreen('sets');
      setArgs({});
    } else if (tutorialStep === 8) {
      setScreen('dex');
      setArgs({});
    } else if (tutorialStep === 9) {
      setScreen('home');
      setArgs({});
      setSellItem(DEMO_COLLECTION[0]);
      setSellOpen(true);
    } else {
      if (prev === 9) setSellOpen(false);
      if (prev === 5 || prev === 7 || prev === 8) {
        setScreen('home');
        setArgs({});
      }
    }
  }, [tutorialStep, tutorialActive]);

  // scan flow state
  const [scanState, setScan] = React.useState({
    identity: null, frontFile: null, backFile: null, report: null,
  });

  // toast notifications
  const [toast, setToast] = React.useState(null);
  const showToast = msg => { setToast(null); setTimeout(() => setToast(msg), 10); };

  // auth: persisted in localStorage
  const [authUser, setAuthUser] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('pg_auth') || 'null'); }
    catch { return null; }
  });
  const saveAuthUser = (u) => {
    setAuthUser(u);
    try {
      if (u) localStorage.setItem('pg_auth', JSON.stringify(u));
      else   localStorage.removeItem('pg_auth');
    } catch {}
  };

  // collection: persisted in localStorage via effect
  const [collection, setCollection] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('pg_collection') || '[]'); }
    catch { return []; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('pg_collection', JSON.stringify(collection)); } catch {}
  }, [collection]);
  const saveCollection = setCollection;

  const goTo = (s, args = {}) => { setScreen(s); setArgs(args); };
  const openSell  = (item) => { setSellItem(item); setSellOpen(true); };
  const closeSell = () => setSellOpen(false);

  const tab = screen === 'home' ? 'home'
    : (screen === 'collection' || screen === 'collection-item' ||
       screen === 'sets' || screen === 'set-detail' || screen === 'dex') ? 'collection'
    : 'scan';
  const setTab = k => {
    if (k === 'home')            goTo('home');
    else if (k === 'collection') goTo('collection');
    else                         goTo('scan-upload', { mode:'upload' });
  };

  const back = () => {
    if (screen === 'scan-match')           goTo('scan-upload');
    else if (screen === 'scan-report')     goTo('home');
    else if (screen === 'collection-item') goTo('collection');
    else if (screen === 'set-detail')      goTo('sets');
    else                                   goTo('home');
  };

  const handleAnalyze = ({ identity, frontFile, backFile }) => {
    setScan({ identity, frontFile, backFile, report:null });
    goTo('scan-match');
  };

  const handleConfirm = ({ report }) => {
    setScan(s => ({ ...s, report }));
    goTo('scan-report');
  };

  // On login/register success: sync local items to Supabase then reload
  const handleAuth = async (user) => {
    saveAuthUser(user);
    setAuthOpen(false);
    try {
      // Upload any local-only items (no remoteId) to Supabase
      const localOnly = collection.filter(i => !i.remoteId);
      for (const li of localOnly) {
        try {
          const r = await apiFetch('/api/collection', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ report: li.report }),
          }, user.token);
          // Update local item with Supabase id
          saveCollection(prev => prev.map(x => x.id === li.id ? { ...x, id: r.id, remoteId: r.id } : x));
        } catch {}
      }
      // Fetch final remote collection
      const { items } = await apiFetch('/api/collection', {}, user.token);
      const remoteItems = items.map(i => ({
        id: i.id, remoteId: i.id,
        addedAt: new Date(i.added_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }),
        report: i.report,
      }));
      saveCollection(remoteItems);
    } catch (e) {
      console.warn('Collection sync failed:', e.message);
    }
  };

  const handleLogout = () => {
    saveAuthUser(null);
    // Keep whatever is in localStorage, just mark items as local-only
    const local = collection.map(i => ({ ...i, remoteId: undefined }));
    saveCollection(local);
  };

  const handleAddToCollection = async (report) => {
    const localId = String(Date.now());
    const newItem = {
      id: localId, remoteId: null,
      addedAt: new Date().toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }),
      report,
    };
    const updated = [...collection, newItem];
    saveCollection(updated);

    // Toast when reaching 3+ cards from same set
    const newSetName = report?.identity?.set_name;
    if (newSetName) {
      const sameSet = collection.filter(i => i.report?.identity?.set_name === newSetName);
      if (sameSet.length >= 2) showToast(`${sameSet.length + 1} cartes de ${newSetName} !`);
    }

    if (authUser) {
      try {
        const r = await apiFetch('/api/collection', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ report }),
        }, authUser.token);
        saveCollection(c => c.map(x => x.id === localId ? { ...x, id: r.id, remoteId: r.id } : x));
      } catch (e) {
        console.warn('Remote add failed:', e.message);
      }
    }
  };

  const handleRemove = async (id) => {
    const item = collection.find(i => i.id === id);
    saveCollection(collection.filter(i => i.id !== id));
    if (authUser && item?.remoteId) {
      try {
        await apiFetch(`/api/collection/${item.remoteId}`, { method:'DELETE' }, authUser.token);
      } catch (e) {
        console.warn('Remote delete failed:', e.message);
      }
    }
  };

  const demoMode = tutorialActive || sandboxMode;
  const activeCollection = demoMode ? DEMO_COLLECTION : collection;

  let content;
  if (screen === 'home') {
    content = <Dashboard theme={theme} accent={accent} collection={activeCollection} goTo={goTo} openSell={openSell} authUser={authUser} openAuth={() => setAuthOpen(true)} onLogout={handleLogout} tutorialActive={demoMode}/>;
  } else if (screen === 'scan-upload') {
    content = <ScanUpload theme={theme} accent={accent} back={back} mode={screenArgs.mode||'upload'} onAnalyze={handleAnalyze}/>;
  } else if (screen === 'scan-match') {
    content = <ScanMatch theme={theme} accent={accent} identity={scanState.identity} frontFile={scanState.frontFile} backFile={scanState.backFile} back={back} onConfirm={handleConfirm}/>;
  } else if (screen === 'scan-report') {
    const _srReport = screenArgs.collectionItem?.report || scanState.report;
    const _srOnAdd  = screenArgs.collectionItem ? () => {} : handleAddToCollection;
    content = <ScanReport theme={theme} accent={accent} report={_srReport} back={back} goTo={goTo} onAdd={_srOnAdd} openSell={openSell} openShare={r => { setShareItem(r); setShareOpen(true); }}/>;
  } else if (screen === 'collection' || screen === 'collection-item' ||
             screen === 'sets' || screen === 'set-detail' || screen === 'dex') {
    content = <CollectionHub
      theme={theme} accent={accent} collection={activeCollection}
      goTo={goTo} openSell={openSell} onRemove={handleRemove} tutorialActive={demoMode}
      screen={screen} screenArgs={screenArgs} back={back}
      openShare={r => { setShareItem(r); setShareOpen(true); }}
    />;
  }

  return (
    <div style={{ background:theme.bg, minHeight:'100dvh', display:'flex', flexDirection:'column', color:theme.text }}>
      <TopBar theme={theme} accent={accent} onSettings={() => setSettingsOpen(true)} authUser={authUser} tutorialActive={demoMode}/>
      {sandboxMode && <SandboxBanner theme={theme} accent={accent} onAuth={() => exitSandbox(true)} onGuest={() => exitSandbox(false)}/>}
      <div style={{ flex:1, overflow:'hidden', position:'relative', display:'flex', flexDirection:'column' }}>
        {content}
      </div>
      <BottomTabs tab={tab} setTab={setTab} theme={theme} accent={accent}/>
      {sellOpen     && <SellSheet    theme={theme} accent={accent} item={sellItem} onClose={closeSell} demoListing={sellItem?.id === 'sandbox-1' ? DEMO_LISTING : null}/>}
      {settingsOpen && <ProfileSheet theme={theme} accent={accent} dark={dark} onDark={handleDark} onClose={() => setSettingsOpen(false)} onReplayTutorial={replayTutorial} authUser={authUser} onLogout={handleLogout} collection={activeCollection} accentKey={accentKey} onAccent={handleAccent}/>}
      {authOpen     && <AuthSheet    theme={theme} accent={accent} onClose={() => setAuthOpen(false)} onAuth={handleAuth}/>}
      {shareOpen    && <ShareModal   theme={theme} report={shareItem} onClose={() => { setShareOpen(false); setShareItem(null); }}/>}
      {toast        && <Toast message={toast} onDone={() => setToast(null)}/>}
      {tutorialActive && (
        <TutorialOverlay
          step={tutorialStep}
          theme={theme}
          accent={accent}
          onNext={nextTutorialStep}
          onSkip={skipTutorial}
          onComplete={completeTutorial}
          openAuth={completeTutorialAuth}
          onExplore={exploreSandbox}
        />
      )}
      {tutorialExiting && <TutorialExitOverlay theme={theme}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
